syntax = "proto3";

option csharp_namespace = "DebitCardApi";

package greet;

service Greeter {
  rpc GetReservations (GetReservationsRequest) returns (GetReservationsReply);
  rpc RegisterReservations (RegisterReservationsRequest) returns (RegisterReservationsReply);
  rpc SignReservation (SignReservationRequest) returns (SignReservationReply);
}

message GetReservationsRequest {
  string card_number = 1;
}

message GetReservationsReply {
  repeated Reservation reservations = 1;
}

message RegisterReservationsRequest {
  Reservation reservation = 1;
}

message RegisterReservationsReply {
  string reservation_id = 1;
  string message = 2;
}

message SignReservationRequest {
  string reservation_id = 1;
  string signature = 2;
}

message SignReservationReply {
  string message = 1;
}

message Reservation {
  string reservation_id = 1;
  string card_number = 2;
  double amount = 3;
  string merchant = 4;
}
