<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 780" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="780" fill="#f8fafc"/>

  <!-- Title -->
  <text x="520" y="52" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">The Reverse Hydra</text>
  <text x="520" y="82" text-anchor="middle" font-size="17" fill="#64748b">One contract (the head) &#183; many swappable bodies</text>

  <!-- Client -->
  <rect x="440" y="108" width="160" height="48" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Card terminal</text>
  <text x="520" y="148" text-anchor="middle" font-size="12" fill="#64748b">gRPC client</text>
  <line x1="520" y1="156" x2="520" y2="184" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- HEAD: the contract / ingress -->
  <rect x="300" y="186" width="440" height="78" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="520" y="216" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a8a">THE HEAD &#183; one gRPC contract</text>
  <text x="520" y="240" text-anchor="middle" font-size="14" fill="#1d4ed8">Ingress &#8226; https://debit-card-api.local</text>
  <text x="520" y="256" text-anchor="middle" font-size="12" fill="#3b82f6">never changes &#8212; clients always call this one address</text>
  <line x1="520" y1="264" x2="520" y2="300" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ROUTER: the neck -->
  <rect x="330" y="302" width="380" height="74" rx="14" fill="#ccfbf1" stroke="#0f766e" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="520" y="332" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">Router Service &#183; the neck</text>
  <text x="520" y="356" text-anchor="middle" font-size="13.5" fill="#0d9488" font-family="Consolas, 'Courier New', monospace">selector: variant = {activeVariant}</text>

  <!-- Necks to the two bodies -->
  <path d="M470,376 C430,420 320,420 280,468" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <path d="M570,376 C610,420 720,420 760,468" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#arrowAmber)"/>

  <!-- Regular body (LIVE) -->
  <rect x="116" y="470" width="328" height="104" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="346" y="482" width="86" height="24" rx="12" fill="#16a34a"/>
  <text x="389" y="499" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">&#9679; LIVE</text>
  <text x="140" y="508" font-size="17" font-weight="700" fill="#166534">regular body</text>
  <text x="140" y="532" font-size="13.5" fill="#15803d" font-family="Consolas, 'Courier New', monospace">STIP_Enabled = false</text>
  <text x="140" y="556" font-size="13" fill="#16a34a">talks to the real backend</text>

  <!-- STIP body (standby) -->
  <rect x="596" y="470" width="328" height="104" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" stroke-dasharray="7 5" filter="url(#shadow)"/>
  <rect x="826" y="482" width="86" height="24" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="869" y="499" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">standby</text>
  <text x="620" y="508" font-size="17" font-weight="700" fill="#92400e">stip body</text>
  <text x="620" y="532" font-size="13.5" fill="#b45309" font-family="Consolas, 'Courier New', monospace">STIP_Enabled = true</text>
  <text x="620" y="556" font-size="13" fill="#d97706">stands in during a backend outage</text>

  <!-- Backend -->
  <g filter="url(#shadow)">
    <path d="M190,628 a90,14 0 0 1 180,0 v44 a90,14 0 0 1 -180,0 z" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <ellipse cx="280" cy="628" rx="90" ry="14" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  </g>
  <text x="280" y="660" text-anchor="middle" font-size="13.5" font-weight="600" fill="#475569">Backend (authorisation)</text>
  <line x1="280" y1="574" x2="280" y2="612" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Switch callout -->
  <rect x="596" y="612" width="360" height="120" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="2" stroke-dasharray="4 4" filter="url(#shadow)"/>
  <text x="616" y="640" font-size="14" font-weight="700" fill="#0f766e">Flip the body with one command</text>
  <rect x="616" y="652" width="320" height="30" rx="6" fill="#0f172a"/>
  <text x="630" y="672" font-size="13" fill="#5eead4" font-family="Consolas, 'Courier New', monospace">helm upgrade --set activeVariant=stip</text>
  <text x="616" y="702" font-size="12.5" fill="#475569">Both bodies keep running, so in-flight calls</text>
  <text x="616" y="720" font-size="12.5" fill="#475569">finish and the client never reconnects.</text>

  <!-- dotted connector: switch changes the router selector -->
  <path d="M700,612 C690,520 660,430 600,380" fill="none" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="724" y="500" font-size="11.5" fill="#0f766e" font-style="italic">changes the selector</text>

  <!-- Legend -->
  <line x1="120" y1="700" x2="156" y2="700" stroke="#16a34a" stroke-width="3"/>
  <text x="164" y="704" font-size="12.5" fill="#475569">active path</text>
  <line x1="120" y1="722" x2="156" y2="722" stroke="#d97706" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="164" y="726" font-size="12.5" fill="#475569">standby</text>
</svg>
