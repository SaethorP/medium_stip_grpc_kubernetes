apiVersion: v1
kind: Service
metadata:
  name: {{ include "debit-card-api.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "debit-card-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "debit-card-api.selectorLabels" . | nindent 4 }}
    debit-card-api/variant: {{ .Values.activeVariant }}
